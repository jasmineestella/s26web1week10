<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/style.css" rel="stylesheet">
    <title>Week 10 Flexbox</title>
</head>
<body>
    <!--A container div (that contains all the content of your site) lets you limit the width of your site and style the 
    site seperate from the body-->
    <div class="container">
    <header>
        <!--there should only be one h1 tag per HTML page-->
        <h1>CSS Flexbox</h1>
    </header>
    <nav>
        <!--using ul for navigation gives you more elements to style 
        and more flexibility when doing responsive design-->
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Stuff</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

    </nav>
    <main>
    <div>one</div>
    <div>two this div has more content than the others</div>
    <div>three</div>
    <div>four</div>
    <div>five</div>    
    </main>
    <footer>
        <div class="footnav">
            <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Stuff</a></li>
            <li><a href="#">Contact</a></li>
        </ul> 
        </div>
        <div class="copy">
            <p>&copy; experimental website</p>
        </div>
        <div class="contact">
            <p>contact me here</p>
            <input type="text">
        </div>
    </footer>
    </div>
</body>
</html>
